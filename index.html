<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ToDo App</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #ddd;
        text-align: center;
    }

    h1, h2 {
        color: blue;
    }

    .container {
        width: 60%;
        margin: auto;
    }

    input {
        width: 70%;
        padding: 8px;
        font-size: 16px;
    }

    button {
        padding: 8px 12px;
        font-size: 14px;
        cursor: pointer;
    }

    .add-btn {
        background-color: blue;
        color: white;
        border: none;
    }

    .box {
        border: 2px solid green;
        padding: 10px;
        margin-top: 10px;
        min-height: 40px;
    }

    .task {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid lightgreen;
        padding: 8px;
        margin: 5px 0;
        background-color: #eee;
    }

    .remove-btn {
        background-color: red;
        color: white;
        border: none;
        border-radius: 5px;
        padding: 5px 10px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>ToDo App</h1>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button class="add-btn" onclick="addTask()">Add Task</button>

    <h2>Total Task</h2>
    <div id="totalTasks" class="box"></div>

    <h2>Completed Task</h2>
    <div id="completedTasks" class="box"></div>
</div>

<script>
    function addTask() {
        const input = document.getElementById("taskInput");
        const value = input.value.trim();

        if (value === "") return;

        const taskDiv = document.createElement("div");
        taskDiv.className = "task";

        const text = document.createElement("span");
        text.textContent = value;

        const removeBtn = document.createElement("button");
        removeBtn.textContent = "Remove";
        removeBtn.className = "remove-btn";
        
        const completeBtn = document.createElement("button");
        completeBtn.textContent = "Complete";
        completeBtn.className = "complete-btn";
        
        completeBtn.onclick = function(){
            const strike = document.createElement("strike");
            strike.textContent = text.textContent;
            taskDiv.removeChild(text);
            taskDiv.appendChild(strike);
            removeBtn.remove();
            completeBtn.remove();
            document.getElementById("completedTasks").appendChild(taskDiv);
        }

        removeBtn.onclick = function () {
            taskDiv.remove();
            
        };

        taskDiv.appendChild(text);
        taskDiv.appendChild(removeBtn);
        taskDiv.appendChild(completeBtn);

        document.getElementById("totalTasks").appendChild(taskDiv);

        input.value = "";
    }
</script>

</body>
</html>
